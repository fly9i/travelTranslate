name: TravelTranslator
options:
  bundleIdPrefix: com.traveltranslator
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  xcodeVersion: "15.0"

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

targets:
  TravelTranslator:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TravelTranslator
        excludes:
          - "Resources/Info.plist.template"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.traveltranslator.app
        PRODUCT_NAME: TravelTranslator
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_CATALYST: NO
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
    info:
      path: TravelTranslator/Info.plist
      properties:
        CFBundleDisplayName: TravelTranslator
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        API_BASE_URL: "http://192.168.1.177:8000"
        NSMicrophoneUsageDescription: "用于语音输入以进行翻译。"
        NSSpeechRecognitionUsageDescription: "用于语音识别以生成翻译文本。"
        NSCameraUsageDescription: "用于拍照翻译菜单或路牌。"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
